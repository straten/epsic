# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.14"
  jobs:
    pre_build:
      - curl -sL https://github.com/doxygen/doxygen/releases/download/Release_1_16_1/doxygen-1.16.1.linux.bin.tar.gz | tar xz -C /tmp
      - export PATH="/tmp/doxygen-1.16.1/bin:$PATH" && cd docs && make doxygen

sphinx:
   configuration: docs/conf.py

python:
   install:
   - requirements: docs/requirements.txt
